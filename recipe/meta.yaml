{% set name = "pyfuse3" %}
{% set version = "3.4.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyfuse3-{{ version }}.tar.gz
  sha256: 0a59031969c4ba51a5ec1b67f3c5c24f641a6a3f8119a86edad56debcb9084d9

build:
  number: 0
  skip: true  # [not linux64 or py<38]
  script:
    - {{ PYTHON }} setup.py build_cython
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - setuptools
    - cython
    - libfuse3
  run:
    - python
    - trio >=0.15

test:
  imports:
    - pyfuse3
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/libfuse/pyfuse3
  summary: Python 3 bindings for libfuse 3 with async I/O support
  license: LGPL-2.1-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
